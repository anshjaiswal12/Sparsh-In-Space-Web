<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="Sparsh in Space — Arthur Tesla vs Sparsh Akuma. A browser arcade shooter." />
  <meta name="theme-color" content="#0a0f28" />
  <title>Sparsh in Space</title>
  <link rel="icon" href="assets/icons/icon.png" type="image/png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <div id="game-wrap">
      <canvas id="game" width="1280" height="960" aria-label="Sparsh in Space game canvas"></canvas>
    </div>

    <div id="control-bar" aria-hidden="true">
      <div id="play-controls" class="control-panel">
        <div class="move-group">
          <button id="btn-left" type="button" aria-label="Move left">◀</button>
          <button id="btn-right" type="button" aria-label="Move right">▶</button>
        </div>
        <button id="btn-fire" type="button" class="fire-btn" aria-label="Fire">FIRE</button>
      </div>

      <div id="dialogue-controls" class="control-panel hidden">
        <div class="dialogue-meta">
          <span class="dialogue-badge">STORY</span>
          <span id="dialogue-progress" class="dialogue-progress">1 / 6</span>
        </div>
        <button id="btn-advance" type="button" class="advance-btn" aria-label="Continue dialogue">
          Continue ▶
        </button>
      </div>
    </div>

    <div id="loader">Loading Sparsh in Space…</div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
